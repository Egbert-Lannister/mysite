{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}{{ block.super }}
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
/* 编辑页内容区加宽（Unfold 在 change_form 下往往仍用 container 限制宽度） */
body.app-posts.model-post.change-form #content {
	max-width: min(96rem, 100%) !important;
	width: 100%;
}
/* 摘要：全宽，可纵向拉伸 */
.change-form.model-post textarea#id_description {
	width: 100% !important;
	max-width: none !important;
	min-width: 0 !important;
	min-height: 7rem;
	resize: vertical;
	box-sizing: border-box;
	font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
	font-size: 0.875rem;
	line-height: 1.5;
}
/* 正文编辑区：与预览同高、底边对齐（由脚本包在 .post-md-editor-col 内） */
.change-form.model-post textarea#id_content {
	width: 100% !important;
	max-width: none !important;
	min-width: 0 !important;
	box-sizing: border-box;
	font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
	font-size: 0.875rem;
	line-height: 1.45;
	flex: 1 1 auto;
	min-height: 0;
	align-self: stretch;
	resize: none;
}
/* 双栏：固定统一高度，底边与右侧预览对齐 */
.post-md-preview-wrap {
	display: grid;
	grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
	gap: 0.75rem;
	align-items: stretch;
	width: 100%;
	max-width: none !important;
	min-height: min(70vh, 44rem);
	height: min(70vh, 44rem);
}
@media (max-width: 1100px) {
	.post-md-preview-wrap {
		grid-template-columns: 1fr;
		height: auto;
		min-height: min(70vh, 44rem);
	}
}
.post-md-editor-col {
	display: flex;
	flex-direction: column;
	min-height: 0;
	min-height: min(70vh, 44rem);
}
.post-md-preview-toolbar {
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 0.5rem 1rem;
	margin-bottom: 0.5rem;
	font-size: 0.8125rem;
	color: rgb(107 114 128);
}
.dark .post-md-preview-toolbar {
	color: rgb(156 163 175);
}
.post-md-preview-toolbar strong {
	color: rgb(55 65 81);
	font-weight: 600;
}
.dark .post-md-preview-toolbar strong {
	color: rgb(209 213 219);
}
.post-md-preview-pane {
	border: 1px solid rgb(229 231 235);
	border-radius: 0.375rem;
	padding: 0.75rem 1rem;
	box-sizing: border-box;
	height: 100%;
	min-height: min(70vh, 44rem);
	max-height: min(70vh, 44rem);
	overflow: auto;
	background: rgb(249 250 251);
	font-size: 0.875rem;
	line-height: 1.6;
}
.dark .post-md-preview-pane {
	border-color: rgb(55 65 81);
	background: rgb(17 24 39);
	color: rgb(229 231 235);
}
.post-md-preview-pane .katex-display {
	overflow-x: auto;
	padding: 0.35rem 0;
}
.post-md-preview-pane pre {
	overflow-x: auto;
	padding: 0.75rem;
	border-radius: 0.25rem;
	background: rgb(243 244 246);
	font-size: 0.8125rem;
}
.dark .post-md-preview-pane pre {
	background: rgb(31 41 55);
}
.post-md-preview-pane code {
	font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
	font-size: 0.8125em;
}
.post-md-preview-pane table {
	width: 100%;
	border-collapse: collapse;
	font-size: 0.875em;
}
.post-md-preview-pane th,
.post-md-preview-pane td {
	border: 1px solid rgb(209 213 219);
	padding: 0.35rem 0.5rem;
}
.dark .post-md-preview-pane th,
.dark .post-md-preview-pane td {
	border-color: rgb(75 85 99);
}
.post-md-preview-status {
	font-size: 0.75rem;
	opacity: 0.85;
}
.post-md-preview-pane.is-loading {
	opacity: 0.55;
	pointer-events: none;
}
</style>
{% endblock %}

{% block form_after %}
{{ block.super }}
<script src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script>
(function () {
	const previewUrl = "{% url 'admin_post_preview_markdown' %}";
	const ta = document.getElementById("id_content");
	if (!ta) return;

	const grow = ta.closest("div.grow.relative");
	if (!grow) return;

	function debounce(fn, ms) {
		let t;
		return function () {
			clearTimeout(t);
			const args = arguments;
			t = setTimeout(function () { fn.apply(null, args); }, ms);
		};
	}

	const csrftoken = document.querySelector("[name=csrfmiddlewaretoken]");
	const csrf = csrftoken ? csrftoken.value : "";

	const wrap = document.createElement("div");
	wrap.className = "post-md-preview-wrap";

	const toolbar = document.createElement("div");
	toolbar.className = "post-md-preview-toolbar";
	toolbar.innerHTML =
		"<strong>正文 Markdown</strong>" +
		"<span>左侧编辑，右侧与站点相同渲染（含 LaTeX，由 KaTeX 渲染）</span>" +
		"<button type=\"button\" class=\"border border-base-200 dark:border-base-600 rounded-default px-2 py-1 text-xs font-medium hover:bg-base-100 dark:hover:bg-base-800\" id=\"post-md-preview-refresh\">刷新预览</button>" +
		"<span class=\"post-md-preview-status\" id=\"post-md-preview-status\"></span>";

	const editorCol = document.createElement("div");
	editorCol.className = "post-md-editor-col";

	const previewCol = document.createElement("div");
	previewCol.className = "post-md-preview-pane article-content";
	previewCol.id = "post-content-md-preview";
	previewCol.innerHTML = "<p class=\"text-base-400 dark:text-base-500 text-sm\">加载预览中…</p>";

	const helpNext = ta.nextElementSibling;
	grow.insertBefore(toolbar, ta);
	grow.insertBefore(wrap, ta);

	editorCol.appendChild(ta);
	if (
		helpNext &&
		helpNext.matches &&
		helpNext.matches("div.leading-relaxed.mt-2.text-xs")
	) {
		editorCol.appendChild(helpNext);
	}
	wrap.appendChild(editorCol);
	wrap.appendChild(previewCol);

	const statusEl = document.getElementById("post-md-preview-status");

	function renderMath(container) {
		if (!window.renderMathInElement) return;
		try {
			window.renderMathInElement(container, {
				delimiters: [
					{ left: "$$", right: "$$", display: true },
					{ left: "$", right: "$", display: false },
				],
				throwOnError: false,
				ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"],
			});
		} catch (e) { /* ignore */ }
	}

	async function updatePreview() {
		if (!csrf) {
			previewCol.innerHTML = "<p class=\"text-red-500 text-sm\">缺少 CSRF，无法预览。</p>";
			return;
		}
		previewCol.classList.add("is-loading");
		if (statusEl) statusEl.textContent = "渲染中…";
		const body = new URLSearchParams();
		body.set("content", ta.value);
		body.set("csrfmiddlewaretoken", csrf);
		try {
			const r = await fetch(previewUrl, {
				method: "POST",
				headers: { "X-Requested-With": "XMLHttpRequest" },
				body: body,
				credentials: "same-origin",
			});
			const data = await r.json();
			if (!r.ok || !data.ok) {
				throw new Error(data.error || ("HTTP " + r.status));
			}
			previewCol.innerHTML = data.html || "";
			renderMath(previewCol);
			if (statusEl) statusEl.textContent = "已同步";
		} catch (e) {
			previewCol.innerHTML = "<p class=\"text-red-500 text-sm\">预览失败：" + String(e.message || e) + "</p>";
			if (statusEl) statusEl.textContent = "失败";
		} finally {
			previewCol.classList.remove("is-loading");
		}
	}

	const debounced = debounce(updatePreview, 450);
	ta.addEventListener("input", debounced);
	document.getElementById("post-md-preview-refresh")?.addEventListener("click", function (e) {
		e.preventDefault();
		updatePreview();
	});

	function kick() {
		if (window.renderMathInElement && window.katex) {
			updatePreview();
		} else {
			setTimeout(kick, 30);
		}
	}
	kick();
})();
</script>
{% endblock %}

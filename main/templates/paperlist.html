<!DOCTYPE html>
<html>

<head>
    <title>Paper List</title>
</head>

<body>
    <h1>Paper List</h1>
    <ul>
        {% for id, paper in papers.items %}
        <li>
            <a href="{% url 'paper_detail' paper_id=id %}">
                {{ paper.title }} by {{ paper.authors }}
            </a>
        </li>
        {% endfor %}
    </ul>
</body>

</html>
